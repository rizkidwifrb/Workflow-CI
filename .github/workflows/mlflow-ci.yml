name: MLflow CI Training

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ Install Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ Install MLflow
      - name: Install Dependencies
        run: |
          pip install mlflow

      # ✅ Run MLflow Project
      - name: Run MLflow Project
        run: |
          mlflow run MLProject